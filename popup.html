<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 280px;
      padding: 15px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      margin: 0;
    }
    h1 {
      font-size: 14px;
      color: #333;
      margin: 0 0 15px 0;
      padding-bottom: 8px;
      border-bottom: 2px solid #4a90d9;
    }
    .status {
      padding: 10px;
      border-radius: 6px;
      margin-bottom: 10px;
    }
    .working {
      background-color: #d4edda;
      color: #155724;
    }
    .not-working {
      background-color: #f8d7da;
      color: #721c24;
    }
    .info-row {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid #eee;
    }
    .info-row:last-child {
      border-bottom: none;
    }
    .label {
      color: #666;
      font-size: 12px;
    }
    .value {
      font-weight: bold;
      font-size: 14px;
    }
    .earnings {
      font-size: 24px;
      color: #4a90d9;
      text-align: center;
      padding: 15px 0;
    }
    .settings-link {
      display: block;
      text-align: center;
      margin-top: 15px;
      color: #4a90d9;
      text-decoration: none;
      font-size: 12px;
    }
    .settings-link:hover {
      text-decoration: underline;
    }
    .error {
      color: #666;
      text-align: center;
      padding: 20px 0;
    }
    .monitor-btn {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      margin-top: 10px;
    }
    .monitor-btn.start {
      background-color: #4a90d9;
      color: white;
    }
    .monitor-btn.stop {
      background-color: #dc3545;
      color: white;
    }
    .monitor-btn:hover {
      opacity: 0.9;
    }
    .monitoring-status {
      font-size: 11px;
      color: #28a745;
      text-align: center;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <h1>KingOfTime給与計算</h1>
  <div id="content">
    <div class="error">読み込み中...</div>
  </div>
  <a href="#" id="settings-link" class="settings-link">設定を開く</a>
  <script src="popup.js"></script>
</body>
</html>
